# Fly.io deployment config for SyncHub.
# Replace the app name before deploying. Fly app names are globally unique.

app = "synchub-your-name"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  # The MVP release path deploys the published Docker image directly.
  # Update this tag for each SyncHub release.
  image = "ghcr.io/bruceblink/synchub:0.1.0"

[env]
  HTTP_ADDR = ":8765"
  DATABASE_DRIVER = "sqlite"
  DATABASE_URL = "/data/synchub.db"
  STORAGE_BACKEND = "local"
  LOCAL_STORAGE_ROOT = "/data/storage"
  CLEANUP_BATCH_LIMIT = "1000"
  VERSION_CLEANUP_INTERVAL_SECONDS = "3600"
  VERSION_RETENTION_MIN_VERSIONS = "20"
  VERSION_RETENTION_MAX_AGE_DAYS = "30"

[mounts]
  source = "synchub_data"
  destination = "/data"
  snapshot_retention = 7

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "3s"
  path = "/readyz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
