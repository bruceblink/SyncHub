services:
  synchub-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: synchub-api:dev
    container_name: synchub-api
    ports:
      - "8765:8765"
    environment:
      HTTP_ADDR: ":8765"
      DATABASE_DRIVER: sqlite
      DATABASE_URL: /data/synchub.db
      LOCAL_STORAGE_ROOT: /data/storage
      VERSION_RETENTION_MIN_VERSIONS: 20
      VERSION_RETENTION_MAX_AGE_DAYS: 30
      JWT_SECRET: "dev-secret-change-me"
    volumes:
      - synchub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8765/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  synchub-data:
