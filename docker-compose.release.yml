services:
  synchub-api:
    image: ${SYNCHUB_IMAGE:-ghcr.io/bruceblink/synchub:0.1.1}
    container_name: ${SYNCHUB_CONTAINER_NAME:-synchub-api}
    ports:
      - "${SYNCHUB_PORT:-8765}:8765"
    environment:
      HTTP_ADDR: ":8765"
      DATABASE_DRIVER: ${DATABASE_DRIVER:-postgres}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL before starting SyncHub}
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data/storage
      CLEANUP_BATCH_LIMIT: 1000
      VERSION_CLEANUP_INTERVAL_SECONDS: 3600
      VERSION_RETENTION_MIN_VERSIONS: 20
      VERSION_RETENTION_MAX_AGE_DAYS: 30
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET before starting SyncHub}
    volumes:
      - synchub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8765/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  synchub-data:
