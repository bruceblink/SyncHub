name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              $tag = "${{ inputs.tag }}"
          }
          if (-not $tag.StartsWith("v")) {
              throw "release tag must start with v: $tag"
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "notes=docs/releases/$tag.md" >> $env:GITHUB_OUTPUT

      - name: Resolve image metadata
        id: image
        shell: pwsh
        run: |
          $repository = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/$repository"
          $version = "${{ steps.release.outputs.version }}"
          $tag = "${{ steps.release.outputs.tag }}"
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $tags = @(
              "${image}:$tag",
              "${image}:$version"
          )
          if ($version -notmatch "-") {
              $tags += "${image}:latest"
          }

          "image=$image" >> $env:GITHUB_OUTPUT
          "build_date=$buildDate" >> $env:GITHUB_OUTPUT
          "tags<<EOF" >> $env:GITHUB_OUTPUT
          $tags | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Resolve source commit
        id: source
        shell: pwsh
        run: |
          $sha = git rev-parse HEAD
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web-admin/pnpm-lock.yaml

      - name: Verify MVP
        shell: pwsh
        run: ./scripts/test-mvp.ps1 -SkipLocalApiSmoke

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ steps.release.outputs.version }}"

      - name: Verify release artifacts
        shell: pwsh
        run: ./scripts/verify-release.ps1 -Version "${{ steps.release.outputs.version }}"

      - name: Smoke test Docker image
        shell: pwsh
        run: ./scripts/test-docker-image.ps1 -Version "${{ steps.release.outputs.version }}" -Image "synchub:${{ steps.release.outputs.version }}" -GoProxy "https://proxy.golang.org,direct"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            GOPROXY=https://proxy.golang.org,direct
            BUILD_DATE=${{ steps.image.outputs.build_date }}
            VCS_REF=${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.title=SyncHub
            org.opencontainers.image.description=Developer workspace sync server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.created=${{ steps.image.outputs.build_date }}

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $version = "${{ steps.release.outputs.version }}"
          $image = "${{ steps.image.outputs.image }}"
          $notes = "${{ steps.release.outputs.notes }}"
          if (-not (Test-Path -LiteralPath $notes)) {
              throw "release notes file is missing: $notes"
          }

          $releaseDir = Join-Path "dist" "synchub-$version"
          $assetFiles = @(Get-ChildItem -LiteralPath $releaseDir -File)
          $assets = @($assetFiles | ForEach-Object { $_.FullName })
          $assetNames = @($assetFiles | ForEach-Object { $_.Name })
          if ($assets.Count -eq 0) {
              throw "no release assets found in $releaseDir"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release edit $tag --title "SyncHub $version" --notes-file $notes
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
              $existingAssets = @(gh release view $tag --json assets --jq ".assets[].name")
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
              foreach ($existingAsset in $existingAssets) {
                  if ($assetNames -notcontains $existingAsset) {
                      gh release delete-asset $tag $existingAsset --yes
                      if ($LASTEXITCODE -ne 0) {
                          exit $LASTEXITCODE
                      }
                  }
              }
              gh release upload $tag @assets --clobber
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
          }
          else {
              gh release create $tag @assets --title "SyncHub $version" --notes-file $notes --verify-tag
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
          }

          $tags = @(
              "${image}:$tag",
              "${image}:$version"
          )
          if ($version -notmatch "-") {
              $tags += "${image}:latest"
          }
          $digest = "${{ steps.docker.outputs.digest }}"
          $summary = @("## Docker Image", "")
          $summary += $tags | ForEach-Object { "- ``$_``" }
          $summary += "- Digest: ``$digest``"
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
