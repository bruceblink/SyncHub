name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || (echo "$files" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test local backup scripts
        shell: pwsh
        run: ./scripts/test-local-backup-restore.ps1

  local-api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test local API smoke flow
        shell: pwsh
        run: ./scripts/test-local-api-smoke.ps1

  docker-compose:
    runs-on: ubuntu-latest
    needs:
      - go
      - local-api-smoke
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Docker Compose smoke flow
        shell: pwsh
        run: ./scripts/test-docker-compose.ps1
