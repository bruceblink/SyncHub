name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web-admin/pnpm-lock.yaml

      - name: Build web admin
        shell: pwsh
        run: ./scripts/build-web-admin.ps1

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || (echo "$files" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  local-api-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web-admin/pnpm-lock.yaml

      - name: Build web admin
        shell: pwsh
        run: ./scripts/build-web-admin.ps1

      - name: Test local API smoke flow
        shell: pwsh
        run: ./scripts/test-local-api-smoke.ps1

  docker-compose:
    runs-on: ubuntu-latest
    needs:
      - go
      - local-api-smoke
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Docker Compose smoke flow
        shell: pwsh
        run: ./scripts/test-docker-compose.ps1
